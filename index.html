<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Animated Skills Bar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="skills-section">
        <h2>My Skills</h2>

        <div class="skill">
            <span>C++</span>
            <div class="progress">
                <div class="progress-bar cpp">90%</div>
            </div>
        </div>

        <div class="skill">
            <span>HTML</span>
            <div class="progress">
                <div class="progress-bar html">95%</div>
            </div>
        </div>

        <div class="skill">
            <span>Bootstrap</span>
            <div class="progress">
                <div class="progress-bar bootstrap">85%</div>
            </div>
        </div>

        <div class="skill">
            <span>Problem Solving</span>
            <div class="progress">
                <div class="progress-bar problem">88%</div>
            </div>
        </div>

    </div>

</body>
</html>
